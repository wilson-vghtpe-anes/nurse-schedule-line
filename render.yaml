services:
  - type: web
    name: nurse-schedule-line
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LIFF_ID
        sync: false
      - key: API_BASE
        sync: false
