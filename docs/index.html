<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>護理排班系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #fff; border-radius: 12px; padding: 32px 24px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
h1 { font-size: 1.3rem; margin-bottom: 8px; color: #222; }
p { color: #666; font-size: .9rem; margin-bottom: 24px; }
.spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #06c755; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>護理排班系統</h1>
  <p>正在載入，請稍候…</p>
  <div class="spinner"></div>
</div>
<script>
window.__LIFF_ID__ = "{{LIFF_ID}}";
window.__API_BASE__ = "{{API_BASE}}";
</script>
<script src="/share.js"></script>
<script>
(async () => {
  await liff.init({ liffId: window.__LIFF_ID__ });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const profile = await liff.getProfile();
  const lineUserId = profile.userId;

  let me;
  try {
    const res = await fetch(window.__API_BASE__ + "/api/me", {
      headers: { "X-Line-User-Id": lineUserId }
    });
    if (res.status === 403) {
      document.querySelector("p").textContent = "帳號尚未綁定或待審核，請聯絡管理者。";
      document.querySelector(".spinner").style.display = "none";
      return;
    }
    me = await res.json();
  } catch {
    document.querySelector("p").textContent = "連線失敗，請重試。";
    document.querySelector(".spinner").style.display = "none";
    return;
  }

  if (me.role === "manager" || me.role === "admin") {
    window.location.href = "/manager.html";
  } else {
    window.location.href = "/nurse.html";
  }
})();
</script>
</body>
</html>
