<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>護理排班 - 護理師</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
.tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; position: sticky; top: 0; z-index: 10; }
.tab-btn { flex: 1; padding: 14px 4px; font-size: .8rem; color: #888; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #06c755; border-bottom-color: #06c755; font-weight: 600; }
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }
.section-title { font-size: .85rem; font-weight: 600; color: #333; margin-bottom: 10px; }
.date-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.date-row label { font-size: .8rem; color: #666; }
input[type=date], select { border: 1px solid #ddd; border-radius: 8px; padding: 7px 10px; font-size: .85rem; }
.btn { display: inline-block; padding: 9px 18px; border-radius: 8px; border: none; font-size: .85rem; cursor: pointer; font-weight: 600; }
.btn-primary { background: #06c755; color: #fff; }
.btn-gray { background: #eee; color: #444; }
.btn-sm { padding: 5px 12px; font-size: .8rem; }
.btn-outline { background: #fff; border: 1px solid #06c755; color: #06c755; }
.card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.shift-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: .88rem; }
.shift-row:last-child { border-bottom: none; }
.shift-tag { display: inline-block; padding: 3px 9px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; font-size: .78rem; font-weight: 600; }
.ot-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: .88rem; }
.ot-row:last-child { border-bottom: none; }
.ot-rank { font-weight: 700; color: #1565c0; width: 28px; }
.ot-select-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: .88rem; }
.ot-select-row:last-child { border-bottom: none; }
.ot-select-row:hover { background: #f5f5f5; }
.ot-select-row.selected { background: #e8f5e9; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .75rem; }
.badge-green { background: #e8f5e9; color: #2e7d32; }
.badge-blue { background: #e3f2fd; color: #1565c0; }
.badge-orange { background: #fff3e0; color: #e65100; }
.badge-red { background: #fce4ec; color: #c62828; }
.badge-gray { background: #f5f5f5; color: #666; }
.req-card { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); font-size: .85rem; }
.req-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.req-meta { color: #888; font-size: .78rem; margin-top: 4px; }
.empty { text-align: center; color: #aaa; padding: 32px 0; font-size: .9rem; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; }
.modal h3 { margin-bottom: 16px; font-size: 1rem; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .82rem; color: #555; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: .88rem; }
textarea { resize: vertical; min-height: 60px; }
.modal-btns { display: flex; gap: 10px; margin-top: 4px; }
.toast { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 20px; font-size: .85rem; color: #fff; z-index: 200; }
.toast-ok { background: #2e7d32; }
.toast-err { background: #c62828; }
#loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.7); z-index: 300; justify-content: center; align-items: center; }
.spinner { width: 36px; height: 36px; border: 4px solid #ddd; border-top-color: #06c755; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 400; display: flex; align-items: center; justify-content: center; }
.confirm-box { background: #fff; border-radius: 12px; padding: 24px 20px; max-width: 300px; width: 90%; text-align: center; }
.confirm-box p { margin-bottom: 20px; font-size: .9rem; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.mode-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.mode-btn { padding: 6px 14px; border-radius: 16px; border: 1px solid #ddd; background: #fff; font-size: .8rem; cursor: pointer; }
.mode-btn.active { background: #06c755; color: #fff; border-color: #06c755; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<div id="user-header" style="background:#06c755;color:#fff;padding:10px 16px;">
  <div id="user-name" style="font-weight:600;font-size:.95rem"></div>
  <div id="user-monthly-code" style="font-size:.78rem;opacity:.85;margin-top:2px"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('my-schedule')">我的班表</button>
  <button class="tab-btn" onclick="switchTab('all-schedule')">全員班表</button>
  <button class="tab-btn" onclick="switchTab('ot-priority')">加班順位</button>
  <button class="tab-btn" onclick="switchTab('my-requests')">我的申請</button>
</div>

<!-- Tab: 我的班表 -->
<div id="tab-my-schedule" class="tab-content active">
  <div class="date-row">
    <div class="mode-btns">
      <button class="mode-btn active" onclick="setMyMode('today')">今天</button>
      <button class="mode-btn" onclick="setMyMode('tomorrow')">明天</button>
      <button class="mode-btn" onclick="setMyMode('week')">本週</button>
      <button class="mode-btn" onclick="setMyMode('month')">本月</button>
      <button class="mode-btn" onclick="setMyMode('range')">區間</button>
    </div>
  </div>
  <div id="my-range-row" style="display:none;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
    <input type="date" id="my-start">
    <span style="font-size:.8rem;color:#888">至</span>
    <input type="date" id="my-end">
    <button class="btn btn-primary btn-sm" onclick="loadMySchedule()">查詢</button>
  </div>
  <div id="my-schedule-list"></div>
</div>

<!-- Tab: 全員班表 -->
<div id="tab-all-schedule" class="tab-content">
  <div class="date-row" style="flex-wrap:wrap;gap:6px">
    <label>開始</label>
    <input type="date" id="all-start">
    <label>結束</label>
    <input type="date" id="all-end">
  </div>
  <div class="date-row" style="margin-top:6px;flex-wrap:wrap;gap:6px">
    <input type="text" id="all-name" placeholder="姓名篩選" list="all-name-list" style="flex:1;min-width:80px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:.9rem">
    <datalist id="all-name-list"></datalist>
    <select id="all-shift" onchange="filterAllSchedule()" style="padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-size:.9rem">
      <option value="">全部班別</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="loadAllSchedule()">查詢</button>
  </div>
  <div id="all-schedule-list"></div>
</div>

<!-- Tab: 加班順位 -->
<div id="tab-ot-priority" class="tab-content">
  <div class="date-row" style="flex-wrap:wrap;gap:6px">
    <label>開始</label>
    <input type="date" id="ot-start">
    <label>結束</label>
    <input type="date" id="ot-end">
  </div>
  <div class="date-row" style="margin-top:6px">
    <input type="text" id="ot-name" placeholder="姓名篩選" list="ot-name-list" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:.9rem">
    <datalist id="ot-name-list"></datalist>
    <select id="ot-shift-filter" onchange="renderOtPriority(otPriorityData, document.getElementById('ot-priority-list'))" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:.9rem">
      <option value="">全部班別</option>
      <option value="7-3">7-3</option>
      <option value="9-5">9-5</option>
      <option value="10-6">10-6</option>
      <option value="12-8">12-8</option>
      <option value="3-11">3-11</option>
      <option value="11-7">11-7</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="loadOtPriority()">查詢</button>
  </div>
  <div id="ot-priority-list"></div>
</div>

<!-- Tab: 我的申請 -->
<div id="tab-my-requests" class="tab-content">
  <div id="my-requests-list"></div>
</div>

<!-- Modal: 換加班順位申請 -->
<div class="modal-overlay" id="ot-swap-modal">
  <div class="modal">
    <h3>申請交換加班順位</h3>
    <input type="hidden" id="ot-swap-their-id">
    <input type="hidden" id="ot-swap-my-id">
    <input type="hidden" id="ot-swap-target-user-id">
    <input type="hidden" id="ot-swap-their-date">
    <input type="hidden" id="ot-swap-their-shift">
    <div style="background:#f0f7ff;padding:10px;border-radius:8px;margin-bottom:12px">
      <div style="font-size:.8rem;color:#888">申請交換的目標</div>
      <div id="ot-swap-their-label" style="font-weight:600;margin-top:4px"></div>
    </div>
    <div style="font-size:.85rem;color:#555;margin-bottom:8px">選擇您要提供的加班順位：</div>
    <div id="ot-swap-my-list" style="max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;margin-bottom:12px"></div>
    <div id="ot-swap-warning" style="display:none;background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:10px;font-size:.82rem;line-height:1.5;margin-bottom:12px"></div>
    <div class="form-group">
      <label>備註原因（選填）</label>
      <textarea id="ot-swap-reason" placeholder="說明換順位原因…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gray" style="flex:1" onclick="closeOtSwapModal()">取消</button>
      <button class="btn btn-primary" style="flex:1" id="ot-swap-submit" disabled onclick="submitOtSwap()">送出申請</button>
    </div>
  </div>
</div>

<!-- Modal: 換班申請 -->
<div class="modal-overlay" id="swap-modal">
  <div class="modal">
    <h3 id="swap-modal-title">發換班請求</h3>
    <input type="hidden" id="swap-type">
    <input type="hidden" id="swap-my-slot-id">
    <input type="hidden" id="swap-their-slot-id">
    <input type="hidden" id="swap-target-user-id">
    <div class="form-group">
      <label>您的班次</label>
      <div id="swap-my-slot-label" style="padding:8px;background:#f5f5f5;border-radius:8px;font-size:.88rem;"></div>
    </div>
    <div class="form-group">
      <label>對方的班次</label>
      <div id="swap-their-slot-label" style="padding:8px;background:#f5f5f5;border-radius:8px;font-size:.88rem;"></div>
    </div>
    <div class="form-group">
      <label>備註原因（選填）</label>
      <textarea id="swap-reason" placeholder="說明換班原因…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-gray" style="flex:1" onclick="closeSwapModal()">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitSwapRequest()">送出申請</button>
    </div>
  </div>
</div>

<script>
window.__LIFF_ID__ = "2009846132-Rjy8XLgR";
window.__API_BASE__ = "https://nurse-schedule-line.onrender.com";
</script>
<script src="/share.js"></script>
<script>
let me = null;
let usersMap = {};
let allScheduleData = [];
let otPriorityData = [];
let myOtData = [];
let myMode = "week";
let swapCallback = null;

(async () => {
  loading(true);
  await liff.init({ liffId: window.__LIFF_ID__ });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const profile = await liff.getProfile();
  window._lineUserId = profile.userId;

  try {
    me = await apiFetch("/api/me");
    document.getElementById("user-name").textContent = me.name || "";
  } catch {
    document.body.innerHTML = '<p style="padding:24px;color:#c00">帳號未綁定或待審核。</p>';
    return;
  }

  document.getElementById("ot-start").value = today();
  document.getElementById("ot-end").value = today();
  await Promise.all([loadMySchedule(), loadOtPriority(), loadMyRequests()]);
  loading(false);
})();

function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    const names = ["my-schedule", "all-schedule", "ot-priority", "my-requests"];
    b.classList.toggle("active", names[i] === name);
  });
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
}

function setMyMode(mode) {
  myMode = mode;
  document.querySelectorAll(".mode-btn").forEach((b, i) => {
    const modes = ["today", "tomorrow", "week", "month", "range"];
    b.classList.toggle("active", modes[i] === mode);
  });
  document.getElementById("my-range-row").style.display = mode === "range" ? "flex" : "none";
  if (mode !== "range") loadMySchedule();
}

async function loadMySchedule() {
  const el = document.getElementById("my-schedule-list");
  loading(true);
  try {
    let url = `/api/schedules/me?mode=${myMode}`;
    if (myMode === "range") {
      const s = document.getElementById("my-start").value;
      const e = document.getElementById("my-end").value;
      if (!s || !e) { loading(false); return; }
      url += `&start=${s}&end=${e}`;
    }
    const data = await apiFetch(url);
    usersMap = data.users || {};
    const monthlyCode = (data.schedules || []).find(r => r.monthly_code)?.monthly_code;
    const codeEl = document.getElementById("user-monthly-code");
    if (codeEl) codeEl.textContent = monthlyCode ? `當月代號：${monthlyCode}` : "";
    renderMySchedule(data.schedules, el);
  } catch { el.innerHTML = '<p class="empty">載入失敗</p>'; }
  loading(false);
}

function renderMySchedule(rows, el) {
  if (!rows.length) { el.innerHTML = '<p class="empty">此期間無班表資料</p>'; return; }
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.schedule_date]) byDate[r.schedule_date] = [];
    byDate[r.schedule_date].push(r);
  });
  el.innerHTML = Object.keys(byDate).sort().map(d => `
    <div class="card">
      <div style="font-size:.82rem;color:#888;margin-bottom:6px;">${formatDate(d)}</div>
      ${byDate[d].map(r => `
        <div class="shift-row">
          <div>
            <span class="shift-tag">${r.shift_type}</span>
            ${r.work_area ? `<span style="margin-left:6px;font-size:.78rem;color:#888;background:#f5f5f5;padding:2px 6px;border-radius:8px">${r.work_area}</span>` : ""}
            ${r.ot_seq ? `<span style="margin-left:6px;font-size:.78rem;color:#e65100;background:#fff3e0;padding:2px 6px;border-radius:8px">加班 ${r.ot_seq}</span>` : ""}
          </div>
        </div>`).join("")}
    </div>`).join("");
}

const SHIFT_ORDER = ["7-3","9-5","10-6","12-8","3-11","11-7"];
function shiftSortKey(s) { const i = SHIFT_ORDER.indexOf(s); return i >= 0 ? i : SHIFT_ORDER.length; }
function formatOtCode(shift, order) {
  if (shift === "7-3") {
    if (order >= 200) return `Y${order - 200}`;
    if (order >= 100) return `S${order - 100}`;
    return `n${String(order).padStart(2, "0")}`;
  }
  return `P${order}`;
}

async function loadAllSchedule() {
  const el = document.getElementById("all-schedule-list");
  const s = document.getElementById("all-start").value;
  const e = document.getElementById("all-end").value;
  const name = document.getElementById("all-name").value.trim();
  if (!s || !e) { el.innerHTML = '<p class="empty">請選擇開始與結束日期</p>'; return; }
  loading(true);
  try {
    let url = `/api/schedules?start=${s}&end=${e}`;
    if (name) url += `&name=${encodeURIComponent(name)}`;
    const data = await apiFetch(url);
    usersMap = { ...usersMap, ...data.users };
    allScheduleData = data.schedules;
    document.getElementById("all-name-list").innerHTML = Object.values(data.users).map(n => `<option value="${n}">`).join("");
    // 更新班別選單
    const shifts = [...new Set(data.schedules.map(r => r.shift_type))].sort((a,b) => shiftSortKey(a) - shiftSortKey(b));
    const sel = document.getElementById("all-shift");
    const cur = sel.value;
    sel.innerHTML = `<option value="">全部班別</option>` + shifts.map(s => `<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join("");
    filterAllSchedule();
  } catch { el.innerHTML = '<p class="empty">載入失敗</p>'; }
  loading(false);
}

function filterAllSchedule() {
  const shift = document.getElementById("all-shift").value;
  const rows = shift ? allScheduleData.filter(r => r.shift_type === shift) : allScheduleData;
  renderAllSchedule(rows, document.getElementById("all-schedule-list"));
}

function renderAllSchedule(rows, el) {
  if (!rows.length) { el.innerHTML = '<p class="empty">此期間無班表資料</p>'; return; }
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.schedule_date]) byDate[r.schedule_date] = {};
    if (!byDate[r.schedule_date][r.shift_type]) byDate[r.schedule_date][r.shift_type] = [];
    byDate[r.schedule_date][r.shift_type].push(r);
  });
  el.innerHTML = Object.keys(byDate).sort().map(d => {
    const shifts = Object.keys(byDate[d]).sort((a,b) => shiftSortKey(a) - shiftSortKey(b));
    return `<div class="card" style="margin-bottom:10px">
      <div style="font-size:.82rem;color:#888;margin-bottom:8px">${formatDate(d)}</div>
      ${shifts.map(shift => byDate[d][shift].map(r => {
        const name = usersMap[r.user_id] || "?";
        return `<div class="shift-row">
          <div><span class="shift-tag">${shift}</span><span style="margin-left:8px">${name}</span></div>
          ${r.user_id !== me.id ? `<button class="btn btn-sm btn-outline" onclick="openShiftSwap('${r.id}','${r.user_id}','${name}','${shift}','${d}')">換班</button>` : ""}
        </div>`;
      }).join("")).join("")}
    </div>`;
  }).join("");
}

async function loadOtPriority() {
  const el = document.getElementById("ot-priority-list");
  const s = document.getElementById("ot-start").value;
  const e = document.getElementById("ot-end").value;
  const name = document.getElementById("ot-name").value.trim();
  if (!s || !e) { el.innerHTML = '<p class="empty">請選擇開始與結束日期</p>'; return; }
  loading(true);
  try {
    let url = `/api/schedules?start=${s}&end=${e}`;
    if (name) url += `&name=${encodeURIComponent(name)}`;
    const data = await apiFetch(url);
    usersMap = { ...usersMap, ...(data.users || {}) };
    otPriorityData = (data.schedules || []).filter(r => r.ot_seq);
    const dl = document.getElementById("ot-name-list");
    dl.innerHTML = Object.values(data.users || {}).map(n => `<option value="${n}">`).join("");
    renderOtPriority(otPriorityData, el);
  } catch { el.innerHTML = '<p class="empty">載入失敗</p>'; }
  loading(false);
}

function renderOtPriority(rows, el) {
  const shiftFilter = document.getElementById("ot-shift-filter")?.value || "";
  const filtered = shiftFilter ? rows.filter(r => r.shift_type === shiftFilter) : rows;
  if (!filtered.length) { el.innerHTML = '<p class="empty">此期間無加班順序資料</p>'; return; }
  const byDate = {};
  filtered.forEach(r => {
    if (!byDate[r.schedule_date]) byDate[r.schedule_date] = {};
    const k = r.shift_type || "—";
    if (!byDate[r.schedule_date][k]) byDate[r.schedule_date][k] = [];
    byDate[r.schedule_date][k].push(r);
  });
  const otSeqNum = r => parseInt((r.ot_seq || '').replace(/\D/g, '') || '0');
  el.innerHTML = Object.keys(byDate).sort().map(d => {
    const shifts = Object.keys(byDate[d]).sort((a,b) => shiftSortKey(a) - shiftSortKey(b));
    return `<div class="card" style="margin-bottom:10px">
      <div style="font-size:.82rem;color:#888;margin-bottom:8px">${formatDate(d)}</div>
      ${shifts.map(shift => {
        const group = byDate[d][shift].sort((a,b) => otSeqNum(a) - otSeqNum(b));
        return `<div style="margin-bottom:8px">
          <div style="font-weight:600;color:#06c755;margin-bottom:4px">【${shift}】</div>
          ${group.map(r => {
            const name = usersMap[r.user_id] || "?";
            return `<div class="ot-row">
              <div style="display:flex;align-items:center;gap:12px">
                <span class="ot-rank">${r.ot_seq}</span>
                <span>${name}</span>
              </div>
              ${r.user_id !== me.id ? `<button class="btn btn-sm btn-outline" onclick="openOtSwap('${r.id}','${r.user_id}','${name}','${r.ot_seq}','${shift}','${d}')">換順序</button>` : ""}
            </div>`;
          }).join("")}
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}

async function loadMyRequests() {
  const el = document.getElementById("my-requests-list");
  try {
    const data = await apiFetch("/api/swap-requests/me");
    usersMap = { ...usersMap, ...(data.users || {}) };
    renderMyRequests(data.swap_requests, el);
  } catch { el.innerHTML = '<p class="empty">載入失敗</p>'; }
}

function renderMyRequests(reqs, el) {
  if (!reqs.length) { el.innerHTML = '<p class="empty">目前無換班申請記錄</p>'; return; }
  el.innerHTML = reqs.map(r => {
    const isRequester = r.requester_id === me.id;
    const isTarget = r.target_user_id === me.id;
    const rname = r.requester_id ? (usersMap[r.requester_id] || "?") : "系統";
    const tname = r.target_user_id ? (usersMap[r.target_user_id] || "?") : "—";
    const rtype = r.request_type === "shift" ? "換班" : r.request_type === "ot_seq" ? "換加班順序" : "主管直接調班";
    const shortId = r.id.slice(0, 8);
    const canCancel = isRequester && ["submitted", "pending_peer"].includes(r.status);
    const canRespond = isTarget && r.status === "pending_peer";
    return `<div class="req-card">
      <div class="req-header">
        <span style="font-weight:600">${rtype}</span>
        ${statusBadge(r.status)}
      </div>
      <div class="req-meta">申請人：${rname} → 對象：${tname}</div>
      ${r.reason ? `<div class="req-meta">備註：${r.reason}</div>` : ""}
      <div class="req-meta" style="color:#bbb">${r.created_at ? r.created_at.slice(0,10) : ""} #${shortId}</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        ${canCancel ? `<button class="btn btn-gray btn-sm" onclick="cancelRequest('${r.id}')">取消申請</button>` : ""}
        ${canRespond ? `<button class="btn btn-primary btn-sm" onclick="respondRequest('${r.id}','accepted')">接受</button><button class="btn btn-gray btn-sm" onclick="respondRequest('${r.id}','rejected')">拒絕</button>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ── Swap modal helpers ─────────────────────────────────────────────────────────

function openShiftSwap(theirScheduleId, theirUserId, theirName, theirShift, dateVal) {
  // Find my own shift on the same date to offer as swap
  const myShifts = allScheduleData.filter(r => r.user_id === me.id);
  if (!myShifts.length) {
    showToast("您在此日無班表可交換", false);
    return;
  }
  // Use first match; user can see their own shift from my-schedule tab
  const myShift = myShifts[0];
  document.getElementById("swap-type").value = "shift";
  document.getElementById("swap-my-slot-id").value = myShift.id;
  document.getElementById("swap-their-slot-id").value = theirScheduleId;
  document.getElementById("swap-target-user-id").value = theirUserId;
  document.getElementById("swap-modal-title").textContent = "發換班請求";
  document.getElementById("swap-my-slot-label").textContent = `${dateVal} ${myShift.shift_type}${myShift.work_area ? " " + myShift.work_area : ""}`;
  document.getElementById("swap-their-slot-label").textContent = `${theirName}：${dateVal} ${theirShift}`;
  document.getElementById("swap-reason").value = "";
  document.getElementById("swap-modal").classList.add("open");
}

async function openOtSwap(theirScheduleId, theirUserId, theirName, theirOtSeq, theirShift, theirDate) {
  loading(true);
  try {
    const month = theirDate.slice(0, 7);
    const startOfMonth = month + '-01';
    const tmp = new Date(startOfMonth);
    tmp.setMonth(tmp.getMonth() + 1);
    tmp.setDate(tmp.getDate() - 1);
    const endOfMonth = tmp.toISOString().slice(0, 10);
    const data = await apiFetch(`/api/schedules/me?mode=range&start=${startOfMonth}&end=${endOfMonth}`);
    myOtData = (data.schedules || []).filter(r => r.ot_seq);
  } catch {
    showToast("載入失敗", false);
    loading(false);
    return;
  }
  loading(false);

  document.getElementById("ot-swap-their-id").value = theirScheduleId;
  document.getElementById("ot-swap-target-user-id").value = theirUserId;
  document.getElementById("ot-swap-their-date").value = theirDate;
  document.getElementById("ot-swap-their-shift").value = theirShift;
  document.getElementById("ot-swap-their-label").textContent = `${theirName}：${formatDate(theirDate)}【${theirShift}】${theirOtSeq}`;
  document.getElementById("ot-swap-my-id").value = "";
  document.getElementById("ot-swap-warning").style.display = "none";
  document.getElementById("ot-swap-submit").disabled = true;
  document.getElementById("ot-swap-reason").value = "";

  const listEl = document.getElementById("ot-swap-my-list");
  if (!myOtData.length) {
    listEl.innerHTML = '<p class="empty" style="padding:12px">當月無加班順序記錄</p>';
  } else {
    listEl.innerHTML = myOtData.map(r =>
      `<div class="ot-select-row" id="ot-sel-${r.id}" onclick="selectMyOtSlot('${r.id}','${r.schedule_date}','${r.shift_type}','${r.ot_seq}')">
        <span style="color:#888;font-size:.82rem;min-width:70px">${formatDate(r.schedule_date)}</span>
        <span class="shift-tag">${r.shift_type}</span>
        <span>${r.ot_seq}</span>
      </div>`).join("");
  }
  document.getElementById("ot-swap-modal").classList.add("open");
}

function selectMyOtSlot(myOtId, myDate, myShift, myOtSeq) {
  document.querySelectorAll(".ot-select-row").forEach(el => el.classList.remove("selected"));
  document.getElementById("ot-sel-" + myOtId).classList.add("selected");
  document.getElementById("ot-swap-my-id").value = myOtId;

  const theirDate = document.getElementById("ot-swap-their-date").value;
  const theirShift = document.getElementById("ot-swap-their-shift").value;
  const warnEl = document.getElementById("ot-swap-warning");

  if (myShift !== theirShift) {
    warnEl.innerHTML = `❌ 班別不同（您的【${myShift}】vs 對方【${theirShift}】），不可交換加班順序。`;
    warnEl.style.background = "#ffebee";
    warnEl.style.borderColor = "#ef9a9a";
    warnEl.style.display = "";
    document.getElementById("ot-swap-submit").disabled = true;
    return;
  }

  const conflict = myOtData.find(r => r.schedule_date === theirDate && r.shift_type === theirShift);
  if (conflict) {
    warnEl.innerHTML = `⚠️ 您在 ${formatDate(theirDate)}【${theirShift}】已有 ${conflict.ot_seq} 順序。` +
      `交換完成後，系統將自動對調此順序與對方在 ${formatDate(myDate)}【${myShift}】的對應順序。`;
    warnEl.style.background = "#fff8e1";
    warnEl.style.borderColor = "#ffc107";
    warnEl.style.display = "";
  } else {
    warnEl.style.display = "none";
  }
  document.getElementById("ot-swap-submit").disabled = false;
}

function closeOtSwapModal() {
  document.getElementById("ot-swap-modal").classList.remove("open");
}

async function submitOtSwap() {
  const myOtId = document.getElementById("ot-swap-my-id").value;
  const theirOtId = document.getElementById("ot-swap-their-id").value;
  const targetUserId = document.getElementById("ot-swap-target-user-id").value;
  const reason = document.getElementById("ot-swap-reason").value;
  if (!myOtId) { showToast("請選擇您要提供的順位", false); return; }
  loading(true);
  try {
    await apiFetch("/api/swap-requests", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        request_type: "ot_seq",
        schedule_id: myOtId,
        target_schedule_id: theirOtId,
        target_user_id: targetUserId,
        reason: reason || null,
      }),
    });
    closeOtSwapModal();
    showToast("申請已送出，等待對方確認");
    await loadMyRequests();
    switchTab("my-requests");
  } catch (e) {
    showToast("送出失敗：" + e.message, false);
  }
  loading(false);
}

function closeSwapModal() {
  document.getElementById("swap-modal").classList.remove("open");
}

async function submitSwapRequest() {
  const stype = document.getElementById("swap-type").value;
  const mySlotId = document.getElementById("swap-my-slot-id").value;
  const theirSlotId = document.getElementById("swap-their-slot-id").value;
  const targetUserId = document.getElementById("swap-target-user-id").value;
  const reason = document.getElementById("swap-reason").value;

  const body = {
    request_type: stype,
    target_user_id: targetUserId,
    reason: reason || null,
  };
  if (stype === "shift") {
    body.schedule_id = mySlotId;
    body.target_schedule_id = theirSlotId;
  } else {
    body.schedule_id = mySlotId;
    body.target_schedule_id = theirSlotId;
  }

  loading(true);
  try {
    await apiFetch("/api/swap-requests", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    closeSwapModal();
    showToast("申請已送出，等待對方確認");
    await loadMyRequests();
    switchTab("my-requests");
  } catch (e) {
    showToast("送出失敗：" + e.message, false);
  }
  loading(false);
}

async function cancelRequest(requestId) {
  const ok = await showConfirm("確定要取消此申請？");
  if (!ok) return;
  loading(true);
  try {
    await apiFetch(`/api/swap-requests/${requestId}/cancel`, { method: "POST" });
    showToast("申請已取消");
    await loadMyRequests();
  } catch (e) {
    showToast("取消失敗：" + e.message, false);
  }
  loading(false);
}

async function respondRequest(requestId, response) {
  const label = response === "accepted" ? "接受" : "拒絕";
  const ok = await showConfirm(`確定要${label}此換班申請？`);
  if (!ok) return;
  loading(true);
  try {
    await apiFetch(`/api/swap-requests/${requestId}/respond`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ response }),
    });
    showToast(response === "accepted" ? "已接受，等待主管審核" : "已拒絕");
    await loadMyRequests();
  } catch (e) {
    showToast("操作失敗：" + e.message, false);
  }
  loading(false);
}
</script>
